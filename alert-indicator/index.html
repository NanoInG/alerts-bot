<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Alert Indicator Strip</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }
        #line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #2ECC71;
            transition: background-color 0.4s ease;
        }
    </style>
</head>
<body>
    <div id="line"></div>
    <script src="./renderer.js"></script>
</body>
</html>
