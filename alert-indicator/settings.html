<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Indicator Settings</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            user-select: none;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #333;
        }

        .header h2 {
            margin: 0;
            font-size: 18px;
            color: #2ECC71;
            letter-spacing: 0.5px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: #1a1a1a;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .card:hover {
            border-color: #444;
            background: #1e1e1e;
        }

        .label-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
        }

        .desc {
            font-size: 11px;
            color: #777;
        }

        /* Color Picker */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: none;
            cursor: pointer;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #333;
            border-radius: 8px;
        }

        /* Range Slider */
        .range-container {
            flex: 1;
            margin-left: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            -webkit-appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #2ECC71;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }

        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.3);
        }

        .height-value {
            font-size: 12px;
            font-family: monospace;
            color: #2ECC71;
            min-width: 30px;
            text-align: right;
        }

        .footer {
            margin-top: 28px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        button {
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-cancel { background: #333; color: #ccc; }
        .btn-cancel:hover { background: #444; color: #fff; }

        .btn-save {
            background: #2ECC71;
            color: #000;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2);
        }
        .btn-save:hover {
            background: #34e17e;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🌿 Налаштування</h2>
    </div>
    
    <div class="section">
        <div class="card">
            <div class="label-group">
                <span class="title">Товщина нитки</span>
                <span class="desc">Висота полоски в пікселях</span>
            </div>
            <div class="range-container">
                                <input type="range" id="strip-height" min="1" max="10" step="1">
                                <span class="height-value" id="height-val">1px</span>
            </div>
        </div>

        <div class="card">
            <div class="label-group">
                <span class="title">Безпечно</span>
                <span class="desc">Колір коли все чіллово</span>
            </div>
            <input type="color" id="color-safe">
        </div>

        <div class="card">
            <div class="label-group">
                <span class="title">Тривога</span>
                <span class="desc">Колір коли пора в укриття</span>
            </div>
            <input type="color" id="color-alert">
        </div>

        <div class="card">
            <div class="label-group">
                <span class="title">Помилка</span>
                <span class="desc">Колір помилки АПІ</span>
            </div>
            <input type="color" id="color-error">
        </div>
    </div>

    <div class="footer">
        <button class="btn-cancel" onclick="window.close()">Закрити</button>
        <button class="btn-save" id="save-btn">Зберегти</button>
    </div>

    <script src="./settings_renderer.js"></script>
</body>
</html>
